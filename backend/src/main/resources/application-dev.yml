spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:nexo_factura}
    username: ${DB_USER:nexo}
    password: ${DB_PASSWORD:nexo}
  jpa:
    properties:
      hibernate:
        format_sql: true

app:
  jwt:
    # Solo desarrollo/test/CI: default conocido para levantar sin variables.
    # En produccion APP_JWT_SECRET es obligatorio (ver application-prod.yml).
    # Sincronizado con JwtSecretValidator.DEV_SECRET.
    secret: ${APP_JWT_SECRET:dev-secret-nexo-factura-cambia-esto-en-produccion-0123456789}
  security:
    # Solo desarrollo/test/CI ("nexo-factura-dev-master-key-0123" en base64).
    # CifradorSecretos la reconoce como clave de desarrollo y el modo
    # POR_EMPRESA en prod la rechaza. Sincronizada con CifradorSecretos.CLAVE_DEV.
    master-key: ${APP_MASTER_KEY:bmV4by1mYWN0dXJhLWRldi1tYXN0ZXIta2V5LTAxMjM=}

logging:
  level:
    cl.nexosoftware.factura: DEBUG
    org.hibernate.SQL: DEBUG
