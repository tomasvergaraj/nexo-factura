spring:
  application:
    name: nexo-factura
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: false
        jdbc:
          time_zone: America/Santiago
  flyway:
    enabled: true
    baseline-on-migrate: true

server:
  port: ${SERVER_PORT:8080}
  error:
    include-message: never
    include-stacktrace: never

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
  api-docs:
    path: /v3/api-docs

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when_authorized

app:
  jwt:
    # APP_JWT_SECRET es obligatorio (al menos 32 bytes UTF-8). Sin default aqui:
    # el default de desarrollo vive solo en application-dev.yml.
    secret: ${APP_JWT_SECRET}
    # Access token corto (con refresh token se renueva sin re-login).
    expiration-minutes: ${APP_JWT_EXPIRATION_MINUTES:60}
    refresh-expiration-days: ${APP_JWT_REFRESH_EXPIRATION_DAYS:14}
  security:
    # Rate limiting de autenticacion: cuenta intentos fallidos por email y por IP.
    rate-limit:
      enabled: ${APP_RATE_LIMIT_ENABLED:true}
      max-intentos-email: ${APP_RATE_LIMIT_MAX_EMAIL:5}
      max-intentos-ip: ${APP_RATE_LIMIT_MAX_IP:20}
      ventana-segundos: ${APP_RATE_LIMIT_VENTANA_SEG:900}
      bloqueo-segundos: ${APP_RATE_LIMIT_BLOQUEO_SEG:900}
      max-entradas: ${APP_RATE_LIMIT_MAX_ENTRADAS:50000}
    # Clave maestra AES-256 (32 bytes base64) para cifrar los PKCS#12 de los
    # clientes antes de persistirlos. Obligatoria con firma-modo=por-empresa;
    # el default de desarrollo vive solo en application-dev.yml.
    master-key: ${APP_MASTER_KEY:}
  cors:
    allowed-origins: ${APP_CORS_ORIGINS:http://localhost:5173,http://localhost:4173}
  sii:
    # CERTIFICACION (apicert/pangal + maullin) o PRODUCCION (api/rahue + palena)
    ambiente: ${APP_SII_AMBIENTE:CERTIFICACION}
    # GLOBAL: un solo certificado por ambiente (cert-path), el modo del E2E de
    # certificacion. POR_EMPRESA: cada empresa firma con su certificado cifrado
    # en BD (multi-tenant de produccion).
    firma-modo: ${APP_SII_FIRMA_MODO:GLOBAL}
    certificado-path: ${APP_SII_CERT_PATH:}
    certificado-password: ${APP_SII_CERT_PASSWORD:}
    # RUN del firmante autorizado; por defecto se extrae del SERIALNUMBER del certificado.
    rut-firmante: ${APP_SII_RUT_FIRMANTE:}
    # FALLBACK de la caratula cuando la empresa no tiene resolucion propia
    # (empresa.fch_resol/nro_resol). En certificacion: FchResol = la fecha que
    # muestra "Datos de la Empresa" del ambiente cert del SII; NroResol = 0 (fijo).
    fch-resol: ${APP_SII_FCH_RESOL:}
    nro-resol: ${APP_SII_NRO_RESOL:0}
    # El WAF del SII bloquea User-Agents de libreria; formato recomendado por su spec.
    user-agent: ${APP_SII_USER_AGENT:Mozilla/4.0 (compatible; PROG 1.0)}
    # Comportamiento inicial del stub del SII (solo perfiles != prod). Tambien
    # es configurable en runtime via PUT /api/dev/sii-stub (contingencia E2E).
    stub:
      disponible: ${APP_SII_STUB_DISPONIBLE:true}
      estado-consulta: ${APP_SII_STUB_ESTADO:ACEPTADO}
      # Reconciliacion por folio previa al reenvio: NO_RECIBIDO deja reenviar;
      # ACEPTADO simula un folio que el SII ya tenia (timeout tras recepcion).
      estado-documento: ${APP_SII_STUB_ESTADO_DOCUMENTO:NO_RECIBIDO}
  dte:
    # Validacion XSD del XML del DTE antes de firmar. Mantener en true salvo
    # diagnostico puntual; en false se emiten DTE sin validar el esquema.
    validar-xsd: ${APP_DTE_VALIDAR_XSD:true}
