spring:
  application:
    name: nexo-factura
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: false
        jdbc:
          time_zone: America/Santiago
  flyway:
    enabled: true
    baseline-on-migrate: true

server:
  port: ${SERVER_PORT:8080}
  error:
    include-message: never
    include-stacktrace: never

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
  api-docs:
    path: /v3/api-docs

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when_authorized

app:
  jwt:
    # APP_JWT_SECRET es obligatorio (al menos 32 bytes UTF-8). Sin default aqui:
    # el default de desarrollo vive solo en application-dev.yml.
    secret: ${APP_JWT_SECRET}
    expiration-minutes: ${APP_JWT_EXPIRATION_MINUTES:480}
  cors:
    allowed-origins: ${APP_CORS_ORIGINS:http://localhost:5173,http://localhost:4173}
  sii:
    # CERTIFICACION (Maullin) o PRODUCCION (Palena)
    ambiente: ${APP_SII_AMBIENTE:CERTIFICACION}
    certificado-path: ${APP_SII_CERT_PATH:}
    certificado-password: ${APP_SII_CERT_PASSWORD:}
