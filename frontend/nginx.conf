server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Enrutamiento SPA: cualquier ruta cae en index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy al backend (usar si se desactiva USE_MOCK en el frontend)
    location /api/ {
        proxy_pass http://backend:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Health público de actuator (página /estado). Solo /health, el resto de
    # actuator no se expone.
    location = /actuator/health {
        proxy_pass http://backend:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
